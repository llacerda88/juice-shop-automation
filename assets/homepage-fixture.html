<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OWASP Juice Shop</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
      .banner { background: #f8e5a1; padding: 12px; text-align: center; }
      .toolbar { display: flex; justify-content: space-between; padding: 12px 24px; border-bottom: 1px solid #ddd; }
      .toolbar input { width: 220px; padding: 8px; }
      .grid { display: grid; grid-template-columns: repeat(3, minmax(180px, 1fr)); gap: 16px; padding: 24px; }
      .card { border: 1px solid #ddd; padding: 16px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <div class="banner">
      <button type="button" aria-label="Close Welcome Banner">Close Welcome Banner</button>
    </div>

    <nav class="toolbar">
      <button type="button">Login</button>
      <input id="searchQuery" placeholder="Search" />
    </nav>

    <main>
      <h1>Juice Shop</h1>
      <div class="grid" id="product-grid">
        <div class="card"><mat-grid-list></mat-grid-list></div>
        <div class="card"><mat-grid-list></mat-grid-list></div>
        <div class="card"><mat-grid-list></mat-grid-list></div>
      </div>
    </main>

    <div class="banner" style="margin-top: 16px;">
      <button type="button">Dismiss</button>
    </div>
  </body>
</html>
